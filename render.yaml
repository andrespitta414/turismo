services:
  - type: web
    name: turismo-django
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && PYTHONPATH=. python manage.py collectstatic --noinput && PYTHONPATH=. python manage.py migrate --noinput
    startCommand: gunicorn turismo_django.wsgi:application --bind 0.0.0.0:$PORT --chdir . --pythonpath .
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: turismo-django.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://turismo-django.onrender.com
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
